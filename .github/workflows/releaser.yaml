name: Release

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: 0 6 * * 0
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]"
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]+*"

permissions:
  contents: write

jobs:
  check-changes:
    # Only needed for scheduled runs (tag push always releases)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      shouldRelease: ${{ steps.check.outputs.shouldRelease }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new commits since last release
        id: check
        uses: ./.github/actions/check-release

  build:
    needs: check-changes
    if: always() && (github.event_name == 'push' || needs.check-changes.outputs.shouldRelease == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux
            runner: ubuntu-latest
            cc: gcc
          - platform: aarch64-linux
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - platform: aarch64-macos
            runner: macos-latest
            cc: clang
          - platform: x86_64-macos
            runner: macos-latest
            cc: clang -arch x86_64
          - platform: x86_64-windows
            runner: windows-latest
            cc: gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compiler
        if: matrix.platform == 'aarch64-linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build all grammars
        uses: ./.github/actions/build-grammar
        with:
          languages: all
          cc: ${{ matrix.cc }}
          strip: "true"

      - name: Package release
        uses: ./.github/actions/package-release
        with:
          platform: ${{ matrix.platform }}
          buildDir: build
          outputDir: release

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: release/*.tar.gz

  validate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux x86_64 build
        uses: actions/download-artifact@v8
        with:
          name: release-x86_64-linux
          path: release/

      - name: Extract shared libraries for validation
        uses: ./.github/actions/extract-tarball
        with:
          tarball: release/tree-sitter-grammars-x86_64-linux.tar.gz
          outputDir: build

      - name: Validate query files
        uses: ./.github/actions/validate-grammar
        with:
          languages: all
          buildDir: build

  release:
    needs:
      - check-changes
      - build
      - validate
    if: always() && needs.build.result == 'success' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: Create release
        uses: ./.github/actions/create-release
        with:
          tag: ${{ github.ref_name || needs.check-changes.outputs.tag }}
          releaseDir: release
          token: ${{ secrets.GITHUB_TOKEN }}
