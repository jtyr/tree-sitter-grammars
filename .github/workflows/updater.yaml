name: Update Grammars

on:
  schedule:
    # Every Saturday at 06:00 UTC
    - cron: 0 6 * * 6
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for upstream updates
        id: check
        uses: ./.github/actions/check-updates

      - name: Fetch updated grammar sources
        if: steps.check.outputs.hasUpdates == 'true'
        uses: ./.github/actions/fetch-grammar
        with:
          languages: ${{ steps.check.outputs.updated }}

      - name: Regenerate GRAMMARS.md
        if: steps.check.outputs.hasUpdates == 'true'
        run: scripts/generate-grammars-md.sh

      - name: Create pull request
        id: create-pr
        if: steps.check.outputs.hasUpdates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Update grammars: ${{ steps.check.outputs.updated }}"
          title: "Update grammars: ${{ steps.check.outputs.updated }}"
          body: |
            Automated grammar update.

            Updated grammars: ${{ steps.check.outputs.updated }}
          branch: auto-update-grammars
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
