name: Fetch Grammar
description: Download tree-sitter grammar source files from upstream

inputs:
  languages:
    description: Space-separated list of language names to fetch
    required: true

runs:
  using: composite
  steps:
    - name: Install tree-sitter CLI
      shell: bash
      run: |
        if ! command -v tree-sitter &>/dev/null; then
          npm install -g tree-sitter-cli
        fi

    - name: Fetch grammar sources
      shell: bash
      run: |
        $GITHUB_ACTION_PATH/scripts/fetch.sh ${{ inputs.languages }}
